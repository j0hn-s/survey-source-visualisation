# Heuristic patterns used by src/parse_references.py to seed the
# publication-type column. The seeded value is always reviewed manually.
# (Order matters: the first match wins.)
publication_type_patterns:
  - label: standards_specification
    display: "Standards / specification"
    patterns:
      - "ISO/IEC"
      - "W3C Recommendation"
      - "Regulation (EU)"
      - "EUR-Lex"
  - label: regulatory_guidance
    display: "Regulatory / policy guidance"
    patterns:
      - "Special Publication"
      - "NIST IR"
      - "Guidelines"
      - "Guidance"
      - "Information Commissioner"
      - "ICO"
      - "Federal Trade Commission"
      - "FTC"
      - "OECD"
      - "European Data Protection Board"
      - "European Commission"
      - "GOV.UK"
      - "Office for National Statistics"
      - "Census Bureau"
  - label: survey_review
    display: "Survey / systematisation"
    patterns:
      - "Foundations and Trends"
      - "scoping review"
      - "systematic review"
      - "A survey"
      - "A review"
      - "SoK"
      - "systematisation"
  - label: technical_whitepaper
    display: "Technical white paper"
    patterns:
      - "White paper"
      - "white paper"
      - "Whitepaper"
      - "Solution brief"
      - "Technical report"
      - "Technical whitepaper"
  - label: software_repository
    display: "Software repository"
    patterns:
      - "[Software]"
      - "GitHub repository"
      - "github.com"
  - label: industry_blog
    display: "Industry / practitioner blog"
    patterns:
      - "Blog"
      - "blog"
      - "Developers Blog"
      - "Online Security Blog"
      - "Research Blog"
      - "IEEE Spectrum"
  - label: preprint
    display: "Preprint"
    patterns:
      - "arXiv preprint"
      - "ePrint Archive"
      - "EasyChair Preprint"
  - label: academic_paper
    display: "Academic paper"
    patterns:
      - "Proceedings of"
      - "Journal of"
      - "Transactions on"
      - "Lecture Notes"
      - "Communications of the ACM"
      - "Nature"
      - "Science"
      - "Scientific Reports"
      - "Cryptography"
      - "Symposium"
      - "Conference"
